<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mój Świat — koncepcja UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: 'Space Grotesk', -apple-system, 'Helvetica Neue', sans-serif;
    background: #070709;
    color: #ECEAF2;
    -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  /* Hide focus rings inside frames since these are static mocks */
  button:focus, input:focus { outline: none; }
  /* Responsive style-guide board */
  @media (max-width: 980px) {
    .found-grid { grid-template-columns: 1fr !important; gap: 36px !important; }
    .icon-grid { grid-template-columns: repeat(6, 1fr) !important; }
  }
  @media (max-width: 560px) {
    .icon-grid { grid-template-columns: repeat(4, 1fr) !important; }
  }
  /* ---- Interaction layer: hover highlight + press feedback ---- */
  [style*="cursor: pointer"], [style*="cursor:pointer"], button, a {
    transition: transform .14s ease, filter .17s ease, background-color .18s ease,
                border-color .18s ease, box-shadow .22s ease, color .18s ease;
  }
  [style*="cursor: pointer"]:hover, [style*="cursor:pointer"]:hover,
  button:hover:not(:disabled) {
    filter: brightness(1.18);
  }
  [style*="cursor: pointer"]:active, [style*="cursor:pointer"]:active,
  button:active:not(:disabled) {
    transform: scale(0.96);
    filter: brightness(0.96);
  }
  /* SVG icons ease their color/stroke when the parent state changes */
  svg { transition: transform .2s ease, opacity .2s ease; }
  /* Top nav links */
  .app-nav a:hover { color: #ECEAF2 !important; }
  /* Device frames lift slightly on hover for the showcase page */
  .frame-lift { transition: transform .3s cubic-bezier(0.4,0,0.2,1), box-shadow .3s ease; }
  .frame-lift:hover { transform: translateY(-4px); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="skin-dusk.jsx"></script>
<script type="text/babel" src="frames.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="foundation.jsx"></script>
<script type="text/babel" src="screens-budget.jsx"></script>
<script type="text/babel" src="screens-rest.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
